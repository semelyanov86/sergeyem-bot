name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Install PHP Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Setup Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/phpunit --colors=always

  deploy:
    needs: [ build ]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          port: 22
          script: |
            sudo -u site_bot HOME=/var/www/bot/shared bash -s << 'DEPLOY'
              set -e
              cd /var/www/bot/current
              git pull origin main
              /usr/local/bin/composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
              /usr/bin/npm install
              /usr/bin/npm run build
              /usr/bin/php8.5 artisan migrate --force
              /usr/bin/php8.5 artisan config:cache
              /usr/bin/php8.5 artisan route:cache
              /usr/bin/php8.5 artisan view:cache
              /usr/bin/php8.5 artisan cache:clear
            DEPLOY
            sudo systemctl reload octane-bot
